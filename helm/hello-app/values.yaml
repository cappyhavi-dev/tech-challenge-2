replicaCount: 2

image:
  repository: 182399722683.dkr.ecr.us-east-2.amazonaws.com/tech-challenge-2-app
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

containerPort: 5000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 12
  cpuUtilization: 50
  memoryUtilization: 50

  #I can include Liveness and Readiness probes here if needed#
  #livenessProbe:
    httpGet:
      path: /health
      port: 5000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  #readinessProbe:
    httpGet:
      path: /ready
      port: 5000
    timeoutSeconds: 5
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    