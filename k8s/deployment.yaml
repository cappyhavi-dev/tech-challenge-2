  selector:
    matchLabels:
      app: tech-challenge-2-app
  template:
    metadata:
      labels:
        app: tech-challenge-2-app
    spec:
      containers:
        - name: tech-challenge-2-app
          image: 182399722683.dkr.ecr.us-east-2.amazonaws.com/tech-challenge-2-app:latest
          ports:
            - containerPort: 5000